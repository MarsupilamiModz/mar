# Production reverse proxy for Next.js + Supabase (large Set-Cookie headers).
# Install: see deploy/apply-nginx-fix.sh

upstream xumarimodz_nextjs {
    server 127.0.0.1:3000;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name xumari-modz.com www.xumari-modz.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name xumari-modz.com www.xumari-modz.com;

    # Adjust paths to your certbot / cert files:
    ssl_certificate /etc/letsencrypt/live/xumari-modz.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/xumari-modz.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 50m;
    large_client_header_buffers 8 32k;

    location / {
        proxy_pass http://xumarimodz_nextjs;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        # Required for Next.js RSC streaming + Supabase auth cookie chunks
        proxy_buffering off;
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
        proxy_busy_buffers_size 256k;

        proxy_read_timeout 300s;
        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
    }
}
